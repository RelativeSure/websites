---
name: CI Pipeline

on:
    push:
        branches: [master]
    pull_request:
        types: [opened, synchronize, reopened]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build (${{ matrix.project }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                project: [fumadocs, starlight, tools]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: "10.34.5"

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "pnpm"
                  cache-dependency-path: "${{ matrix.project }}/pnpm-lock.yaml"

            - name: Install dependencies
              run: cd ${{ matrix.project }} && pnpm install --frozen-lockfile

            - name: Build
              run: cd ${{ matrix.project }} && pnpm run build
